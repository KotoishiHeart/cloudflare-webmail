name: Production read-only preflight

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-read-only-preflight
  cancel-in-progress: false

jobs:
  preflight:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-readonly
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DEPLOYMENT_MANIFEST_JSON: ${{ secrets.DEPLOYMENT_MANIFEST_JSON }}
    steps:
      - name: Check out default branch
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Materialize protected manifest outside the repository
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$DEPLOYMENT_MANIFEST_JSON"
          node -e 'const value = JSON.parse(process.env.DEPLOYMENT_MANIFEST_JSON); if (value.accountId !== process.env.CLOUDFLARE_ACCOUNT_ID) throw new Error("manifest accountId does not match the protected account")'
          printf '%s' "$DEPLOYMENT_MANIFEST_JSON" > "$RUNNER_TEMP/cf-webmail-deployment.json"
      - name: Generate and verify immutable stage
        run: |
          npm run deploy -- plan \
            --manifest "$RUNNER_TEMP/cf-webmail-deployment.json" \
            --stage "$RUNNER_TEMP/cf-webmail-stage"
          npm run deploy -- verify --stage "$RUNNER_TEMP/cf-webmail-stage"
      - name: Check Cloudflare resources without mutation
        run: npm run deploy -- preflight --stage "$RUNNER_TEMP/cf-webmail-stage"
      - name: Preserve non-secret preflight evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-preflight-${{ github.sha }}
          path: ${{ runner.temp }}/cf-webmail-stage/preflight.json
          if-no-files-found: error
          retention-days: 14
